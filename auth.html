    <!-- (Place this at the bottom of body in auth.html, before </body>) -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
        // Use the global supabase client from app.js
        const supabase = window.supabaseClient;

        document.addEventListener('DOMContentLoaded', () => {
            // Theme is already initialized by app.js, just apply it
            if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
            
            const params = new URLSearchParams(window.location.search);
            if (params.get('mode') === 'register') showRegister();
            
            initAuthForms();
        });

        function initAuthForms() {
            // Login Form
            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const email = formData.get('email');
                const password = formData.get('password');
                
                showMessage('Signing in...', 'info');
                
                try {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    
                    const { data: profile, error: profileError } = await supabase.from('profiles').select('*').eq('id', data.user.id).single();
                    if (profileError) throw profileError;
                    
                    if (profile.is_blocked) {
                        await supabase.auth.signOut();
                        showMessage(profile.block_reason || 'Account suspended.', 'error');
                        return;
                    }
                    
                    // Redirect
                    window.location.href = 'app.html';
                } catch (error) {
                    showMessage(error.message || 'Login failed.', 'error');
                }
            });

            // Register Form
            document.getElementById('register-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const password = formData.get('password');
                const confirmPassword = formData.get('confirmPassword');
                
                if (password !== confirmPassword) {
                    showMessage('Passwords do not match.', 'error');
                    return;
                }
                
                showMessage('Creating account...', 'info');
                
                try {
                    const { data, error } = await supabase.auth.signUp({
                        email: formData.get('email'),
                        password: password,
                        options: {
                            data: {
                                first_name: formData.get('firstName'),
                                last_name: formData.get('lastName'),
                                nic: formData.get('nic'),
                                dob: formData.get('dob'),
                                gender: formData.get('gender'),
                                whatsapp: formData.get('whatsapp'),
                                sms_number: formData.get('smsNumber'),
                                district: formData.get('district'),
                                city: formData.get('city'),
                                address: formData.get('address'),
                                stream: formData.get('stream'),
                                role: 'student'
                            }
                        }
                    });
                    
                    if (error) throw error;
                    
                    showMessage('Account created! Please check your email to verify.', 'success');
                    setTimeout(() => showLogin(), 3000);
                    
                } catch (error) {
                    showMessage(error.message || 'Registration failed.', 'error');
                }
            });

            // Forgot Password
            document.getElementById('forgot-password-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = new FormData(e.target).get('email');
                showMessage('Sending link...', 'info');
                const { error } = await supabase.auth.resetPasswordForEmail(email);
                if (error) showMessage(error.message, 'error');
                else showMessage('Check your email for reset link.', 'success');
            });
        }

        // UI Toggle Functions
        function showLogin() {
            document.getElementById('login-form-container').classList.remove('hidden');
            document.getElementById('register-form-container').classList.add('hidden');
            document.getElementById('forgot-password-container').classList.add('hidden');
        }
        function showRegister() {
            document.getElementById('login-form-container').classList.add('hidden');
            document.getElementById('register-form-container').classList.remove('hidden');
            document.getElementById('forgot-password-container').classList.add('hidden');
        }
        function showForgotPassword() {
            document.getElementById('login-form-container').classList.add('hidden');
            document.getElementById('register-form-container').classList.add('hidden');
            document.getElementById('forgot-password-container').classList.remove('hidden');
        }
        function showMessage(msg, type) {
            const el = document.getElementById('auth-message');
            el.classList.remove('hidden');
            el.querySelector('div').textContent = msg;
            el.querySelector('div').className = `p-4 rounded-xl text-sm ${type === 'error' ? 'bg-red-100 text-red-700' : type === 'success' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}`;
        }

        // NIC Parser
        function parseNIC(nic) {
            nic = nic.trim().toUpperCase();
            let year, dayOfYear, gender;
            if (nic.length === 10 && nic[9] === 'V') {
                year = 1900 + parseInt(nic.substring(0, 2));
                dayOfYear = parseInt(nic.substring(2, 5));
            } else if (nic.length === 12) {
                year = parseInt(nic.substring(0, 4));
                dayOfYear = parseInt(nic.substring(4, 7));
            } else return;
            
            gender = dayOfYear > 500 ? 'Female' : 'Male';
            if (dayOfYear > 500) dayOfYear -= 500;
            
            const date = new Date(year, 0, dayOfYear);
            document.getElementById('dob-input').value = date.toISOString().split('T')[0];
            document.getElementById('gender-input').value = gender;
        }
        
        function nextRegisterStep(step) { /* logic for steps */ }
        function prevRegisterStep(step) { /* logic for steps */ }
    </script>
</body>
</html>
